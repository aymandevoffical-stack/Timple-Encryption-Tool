<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayman | Cipher Tool</title>
   <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
    <h2>🔐 Secure Messenger</h2>
    <p>Enter text to Encrypt or Decrypt:</p>
    <textarea id="inputText" placeholder="Write your secret message here..."></textarea>
    <br>
    <button onclick="process(true)">Encrypt (تشفير)</button>
    <button class="decrypt" onclick="process(false)">Decrypt (فك التشفير)</button>
    <h3>Result:</h3>
    <textarea id="outputText" readonly></textarea>
</div>

<script>
    function process(isEncrypt) {
        const input = document.getElementById('inputText').value;
        const offset = 3; // Base shift logic
        let output = "";

        for (let i = 0; i < input.length; i++) {
            let charCode = input.charCodeAt(i);
            output += String.fromCharCode(isEncrypt ? charCode + offset : charCode - offset);
        }
        document.getElementById('outputText').value = output;
    }
</script>

</body>
</html>
